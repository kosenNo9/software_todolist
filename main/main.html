<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Todoアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Todoアプリ</h1>

  <!-- タスク登録 -->
  <div class="task-form">
    <input type="text" id="taskName" placeholder="タスク名">

    <textarea
      id="taskDetail"
      placeholder="タスク詳細">
    </textarea>

    <input type="datetime-local" id="taskDeadline">

    <select id="taskType">
      <option value="課題">課題</option>
      <option value="テスト">テスト</option>
    </select>

    <input type="text" id="taskLabel" placeholder="受講科目">

    <button id="addTaskBtn">登録</button>
  </div>

  <!-- タスク一覧 -->
  <h2>タスク一覧</h2>

  <ul id="taskList"></ul>

  <script src="tasks/task.js"></script>
</body>
</html>
CSS

body {
  font-family: sans-serif;
  margin: 30px;
}

.task-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 300px;
}

input,
textarea,
select,
button {
  padding: 8px;
  font-size: 16px;
}

li {
  margin-top: 10px;
  border: 1px solid #ccc;
  padding: 10px;
  list-style: none;
}
